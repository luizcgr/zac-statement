<div class="flex w-full place-content-center">
  <img src="logo-zac.png" alt="Logo Zac" width="200" class="-mb-5" />
</div>

<div class="flex w-full flex-col items-center px-4">
  @if (cardapio()) {
    <div class="text-center text-[26px] font-bold text-[#09bbf7]">
      {{ cardapio()!.evento }}
    </div>
    <div class="-mt-0.5 mb-6 text-center">
      <div class="text-[18px] text-[#09bbf7]">Cardápio</div>
    </div>

    <!-- Search Input -->
    <div class="mb-4 w-full max-w-2xl">
      <input
        type="text"
        placeholder="Buscar produtos..."
        [value]="filtro()"
        (input)="filtro.set($any($event.target).value)"
        class="w-full rounded-lg border-2 border-[#09bbf7] bg-gray-900/50 px-4 py-3 text-[18px] text-white placeholder-gray-400 focus:ring-2 focus:ring-[#09bbf7] focus:outline-none"
      />
    </div>

    <div class="w-full max-w-2xl space-y-6">
      @for (item of itensFiltrados(); track item.terminal) {
        <div
          class="overflow-hidden rounded-lg border-2 border-[#09bbf7] bg-gray-900/50"
        >
          <!-- Terminal Header -->
          <div class="bg-[#09bbf7] px-4 py-3">
            <div class="text-[20px] font-bold text-white">
              {{ item.terminal }}
            </div>
          </div>

          <!-- Products List -->
          <div class="divide-y divide-gray-700/50">
            @for (produto of item.produtos; track $index) {
              <div class="flex items-center justify-between gap-4 p-4">
                <div class="flex-1">
                  <div class="text-[18px] font-medium text-white">
                    {{ produto.nome }}
                  </div>
                </div>
                <div class="flex-shrink-0">
                  <div class="text-[18px] font-bold text-white">
                    {{ produto.valor | money }}
                  </div>
                </div>
              </div>
            }
          </div>
        </div>
      }
    </div>
  } @else {
    <div class="mt-10 text-center text-[20px] text-white">
      Cardápio não disponível
    </div>
  }
</div>
